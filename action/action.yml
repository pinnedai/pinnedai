# GitHub Action wrapper around the pinnedai CLI.
#
# What this does on every PR:
#   1. Runs `pinned test` — executes every pin in tests/pinned/ via
#      vitest. These pins were emitted by `pinned sweep` (server-action
#      writes, paid-API calls, Edge Functions, cron, Stripe webhooks,
#      journeys, host-conditional families, etc) plus any captured
#      from PR-description claims. Real functional regressions fail CI.
#   2. Runs `pinned check-guard-removal` — blocks AI weakening attempts
#      (`.skip()`, weakened assertions, deleted tests, `--no-verify`
#      bypass). The Guard Integrity layer.
#   3. (Optional) Parses claims from the PR description, generates
#      additional pins, auto-commits them to the PR branch.
#
# Customers can EITHER:
#   (a) Run `npx pinnedai init` once to generate a workflow file
#       directly in their repo (recommended — gives them the @pinned
#       add: comment trigger + concurrency controls + PostToolUse hook
#       for Claude Code), OR
#   (b) Use this Marketplace action as a single drop-in step (below).
#
# Usage in customer repos:
#
#   name: pinned
#   on:
#     pull_request:
#       types: [opened, synchronize, edited]
#   permissions:
#     pull-requests: write
#     contents: write
#     id-token: write
#   jobs:
#     pin:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#           with: { fetch-depth: 0, ref: ${{ github.event.pull_request.head.ref }} }
#         - uses: pinnedai/pinnedai@v0.2.21

name: "pinnedai"
description: "Smoke-test AI-built features so they actually work — not just parse. Pinned runs your endpoints, asserts real outcomes (non-empty, terminal state within bound, rejects bad input, errors on faults), and catches the AI-shipped-but-never-works bug class. Plus regression net: Server Actions, paid-API calls, Edge Functions, cron, webhooks, journeys; first-time-bug detectors (enum drift incl. cross-repo contracts, undeclared env vars, missing DB columns, webhook header typos, unguarded results, response-shape, mass-mutation); FP suppression + readiness gate + AI-lesson injection + Guard Integrity."
author: "Michael Zon"
branding:
  icon: "lock"
  color: "blue"

inputs:
  cli-version:
    description: "pinnedai npm version to use (default: latest)"
    required: false
    default: "latest"
  auto-commit:
    description: "Auto-commit generated tests to the PR branch (default: true). Set to 'false' to use paste-mode only."
    required: false
    default: "true"
  byok:
    description: |
      Bring-your-own-key LLM provider. Set to "anthropic", "openai",
      "claude-code", or "github-models" to route the LLM proposer step
      through your own credentials. Requires the matching secret in
      your repo's settings:
        - anthropic     → PINNEDAI_ANTHROPIC_KEY
        - openai        → PINNEDAI_OPENAI_KEY
        - claude-code   → no key (uses local `claude` CLI if available)
        - github-models → PINNEDAI_GITHUB_TOKEN (or GITHUB_TOKEN)
      Leave empty (default) to run in deterministic mode only — the
      regex-based detectors still run, just no LLM proposer.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # Preflight — fail fast with a clear error if the caller forgot to
    # checkout the repo with fetch-depth: 0 + the PR's head ref. Without
    # the checkout, scan-diff has no history and auto-commit has nowhere
    # to push.
    - name: Preflight (verify checkout)
      shell: bash
      env:
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        if [ ! -d ".git" ]; then
          echo "✗ pinnedai-action requires actions/checkout BEFORE this step." >&2
          echo "  Add to your workflow:" >&2
          echo "    - uses: actions/checkout@v4" >&2
          echo "      with: { fetch-depth: 0, ref: \${{ github.event.pull_request.head.ref }} }" >&2
          exit 1
        fi
        if ! git rev-parse --verify "origin/$BASE_REF" >/dev/null 2>&1; then
          echo "✗ scan-diff needs the PR base ref (origin/$BASE_REF) — set fetch-depth: 0 on actions/checkout." >&2
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Parse claims from PR description
      shell: bash
      env:
        GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
        GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
        PINNEDAI_BYOK: ${{ inputs.byok }}
        PINNEDAI_ANTHROPIC_KEY: ${{ env.PINNEDAI_ANTHROPIC_KEY }}
        PINNEDAI_OPENAI_KEY: ${{ env.PINNEDAI_OPENAI_KEY }}
        CLI_VERSION: ${{ inputs.cli-version }}
      run: npx --yes "pinnedai@$CLI_VERSION" check

    - name: Scan diff for unpinned risk surfaces
      id: scan
      shell: bash
      env:
        GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
        GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
        PINNEDAI_BYOK: ${{ inputs.byok }}
        PINNEDAI_ANTHROPIC_KEY: ${{ env.PINNEDAI_ANTHROPIC_KEY }}
        PINNEDAI_OPENAI_KEY: ${{ env.PINNEDAI_OPENAI_KEY }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
        RUN_ID: ${{ github.run_id }}
        CLI_VERSION: ${{ inputs.cli-version }}
      run: |
        BODY=$(npx --yes "pinnedai@$CLI_VERSION" scan-diff --base "origin/$BASE_REF" --markdown)
        DELIM="PINNED_EOF_$(openssl rand -hex 16 2>/dev/null || echo "${RUN_ID}_$RANDOM")"
        {
          echo "body<<$DELIM"
          echo "$BODY"
          echo "$DELIM"
        } >> "$GITHUB_OUTPUT"
        echo "$BODY"

    - name: Comment on PR with pin suggestions
      if: ${{ !contains(steps.scan.outputs.body, 'No risk surfaces detected') }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUM: ${{ github.event.pull_request.number }}
        COMMENT_BODY: ${{ steps.scan.outputs.body }}
      run: gh pr comment "$PR_NUM" --body "$COMMENT_BODY"

    - name: Auto-commit pinned tests
      if: ${{ inputs.auto-commit != 'false' }}
      shell: bash
      env:
        GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
        GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
        PINNEDAI_BYOK: ${{ inputs.byok }}
        PINNEDAI_ANTHROPIC_KEY: ${{ env.PINNEDAI_ANTHROPIC_KEY }}
        PINNEDAI_OPENAI_KEY: ${{ env.PINNEDAI_OPENAI_KEY }}
        PR_NUM: ${{ github.event.pull_request.number }}
        HEAD_REF: ${{ github.event.pull_request.head.ref }}
        CLI_VERSION: ${{ inputs.cli-version }}
      run: |
        npx --yes "pinnedai@$CLI_VERSION" generate \
          --pr-id "pr-$PR_NUM" \
          --description "$GITHUB_PR_BODY"

        if ! git diff --quiet -- tests/pinned/ 2>/dev/null; then
          git config user.name "pinned[bot]"
          git config user.email "bot@pinnedai.dev"
          git add tests/pinned/
          git commit -m "Pin claims from PR #$PR_NUM"
          git push origin "HEAD:$HEAD_REF"
        else
          echo "No new pins to commit."
        fi
